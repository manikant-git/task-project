# ══════════════════════════════════════════════════════════════
#  TaskFlow — CI/CD Pipeline
#  .github/workflows/cicd.yml
#
#  PIPELINE STAGES:
#  1. TEST    → Run unit tests on the Flask API
#  2. BUILD   → Build & push Docker images to Docker Hub
#  3. DEPLOY  → Deploy to AWS EKS using kubectl
#
#  TRIGGERS:
#  - Push to eks branch
#  - Pull Request to eks branch (test + build only, no deploy)
# ══════════════════════════════════════════════════════════════

name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [ eks ]
  pull_request:
    branches: [ eks ]

# Global environment variables (non-secret)
env:
  DOCKER_IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: taskflow-cluster

jobs:

  # ──────────────────────────────────────────────────────────
  # STAGE 1: TEST
  # Runs Python unit tests against the Flask API
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       taskflow_test
          POSTGRES_USER:     taskuser
          POSTGRES_PASSWORD: taskpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: 🧪 Run tests
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     taskflow_test
          DB_USER:     taskuser
          DB_PASSWORD: taskpass
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ──────────────────────────────────────────────────────────
  # STAGE 2: BUILD & PUSH
  # Builds Docker images and pushes to Docker Hub
  # Only runs on push to eks (not on PRs)
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/eks'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 🏗️ Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
            ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 📋 Print image details
        run: |
          echo "✅ Backend image : ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}"
          echo "✅ Frontend image: ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}"

  # ──────────────────────────────────────────────────────────
  # STAGE 3: DEPLOY TO EKS
  # Connects to EKS cluster and applies k8s manifests
  # Only runs on push to eks after build succeeds
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EKS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/eks'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ☸️ Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: 🚀 Deploy to EKS
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Starting EKS deployment — $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Apply manifests in order
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

          # Update images with latest SHA
          kubectl set image deployment/backend \
            backend=${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }} \
            -n taskflow

          kubectl set image deployment/frontend \
            frontend=${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }} \
            -n taskflow

          # Wait for rollout to complete
          kubectl rollout status deployment/backend  -n taskflow --timeout=120s
          kubectl rollout status deployment/frontend -n taskflow --timeout=120s

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment complete — $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📋 Verify Deployment
        run: |
          kubectl get pods -n taskflow
          kubectl get svc  -n taskflow
