# ══════════════════════════════════════════════════════════════
#  TaskFlow – Three-Tier Architecture
#  docker-compose.yml
#
#  Tier 1 (Presentation) : frontend  – Nginx + HTML  → port 80
#  Tier 2 (Application)  : backend   – Flask API      → port 5000 (internal)
#  Tier 3 (Data)         : db        – PostgreSQL      → port 5432 (internal)
# ══════════════════════════════════════════════════════════════

services:

  # ── TIER 3: Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskflow
      POSTGRES_USER:     taskuser
      POSTGRES_PASSWORD: taskpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ⚠️  DB port is NOT exposed to the host – only the backend can reach it
    # ports:
    #   - "5432:5432"


  # ── TIER 2: Backend API ───────────────────────────────────
  backend:
    image: $DOCKER_IMAGE_BACKEND   
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     taskflow
      DB_USER:     taskuser
      DB_PASSWORD: taskpass
    networks:
      - backend-net
      - frontend-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # ⚠️  Backend port is NOT exposed to the host – only Nginx reaches it
    # ports:
    #   - "5000:5000"


  # ── TIER 1: Frontend (Nginx) ──────────────────────────────
  frontend:
    image: $DOCKER_IMAGE_FRONTEND  
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - frontend-net
    depends_on:
      backend:
        condition: service_healthy


# ── Networks ──────────────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge


# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
